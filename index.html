        <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>

    <body>

							<div class="close-x"></div>
						</button>
                    </div>

                    <div class="modal-body" id="modal_about_body">

                        <div class="row p-0 justify-content-center margin_auto">
                            <div class="col-auto p-0 align-self-center">

                            </div>
                        </div>

                        <div class="row p-0 justify-content-center margin-auto" style="margin-top:1vh;">

                            <div class="col-1" style="text-align: center;">

                            <div class="col-4" style="text-align: left;">
                                <a target="_blank" rel="noopener noreferrer" href="https://github.com/NoahBolohan/hadrians-wall-utilities">Source code</a>
                            </div>

                            <div class="col-1" style="text-align: center;">
                                <img src="https://raw.githubusercontent.com/NoahBolohan/hadrians-wall-utilities/refs/heads/main/static/git_logo.png" style="height:1em;">
                            </div>

                            <div class="col-4" style="text-align: left;">
                                <a target="_blank" rel="noopener noreferrer" href="https://github.com/NoahBolohan/hadrians-wall-utilities/issues/new">Report an issue</a>
                            </div>
                        </div>

                        <br>

                        <div class="row p-0 justify-content-center">

                            <div class="col-auto p-0 align-self-center settings-label">
                                Credits
                            </div>
                        </div>

                        <div class="row p-0 margin_auto">

                            <hr class="hr2">
                        </div>

                        <div class="row p-0 margin_auto">

                            <div class="col-12 p-0">
                                <ul>
                                    <li>Wingspan designed by <a target="_blank" rel="noopener noreferrer" href="https://boardgamegeek.com/boardgamedesigner/103500/bobby-hill">Bobby Hill</a> and published by <a target="_blank" rel="noopener noreferrer" href="http://www.garphill.com/">Garphill Games</a></li>
                                </ul>
                            </div>

        <div class="modal fade" data-bs-backdrop="static" data-keyboard="false" id="modal_settings">

            <div class="modal-dialog" role="document">

                <div class="modal-content">

                    <div class="modal-header p-2 justify-content-center" style="position:relative;">

                        <h2 class="modal-title h2">Settings</h2>
                        <button class="btn btn-settings" id="button_close_modal_settings" style="position:absolute;right:0.5rem;">
							<div class="close-x"></div>
						</button>
                    </div>

                    <div class="modal-body" id="modal_settings_body">

                        <div class="row p-0 justify-content-between margin_auto" id="row_setting_toggle_screen_sleep">

                            <div class="col-5 p-0 align-self-center settings-label">
                                Prevent screen sleep:
                            </div>
            
                            <div class="col-2 offset-5 p-0 text-end">
                                <label class="switch">
                                    <input type="checkbox" id="button_toggle_screen_sleep">
                                    <span class="slider round"></span>
                                </label>
                            </div>
                        </div>

                        <div class="row p-0 justify-content-center margin_auto" style="margin-top:1vh;" id="row_set_web_app_url">

                            <div class="col-5 p-0 align-self-center">
                                <label class="settings-label" for="input_web_app_url">Web App URL:</label>
                            </div>
            
                            <div class="col-7 p-0">
                                <input class="w-100" id="input_web_app_url" placeholder="Paste Web App URL here">
                            </div>
                        </div>

                        <div class="row p-0 justify-content-center margin_auto" id="row_web_app_url_guide">
        
                            <div class="col-7 offset-5 p-0" style="text-align: center;">
                                <a class="w-100" target="_blank" rel="noopener noreferrer" href="https://github.com/NoahBolohan/hadrians-wall-utilities/blob/main/how_to_submit_scores_to_google_sheets.md">Generate a Web App URL</a>
                            </div>
                        </div>

                        <div class="row p-0 justify-content-center margin-auto" style="margin-top: 1vh;">

                            </div>

                            <div class="col-4" style="text-align: left;">
                                <a target="_blank" rel="noopener noreferrer" href="https://github.com/NoahBolohan/hadrians-wall-utilities">Source code</a>
                            </div>

                            <div class="col-1" style="text-align: center;">
                                <img src="https://raw.githubusercontent.com/NoahBolohan/hadrians-wall-utilities/refs/heads/main/static/git_logo.png" style="height:1em;">
                            </div>

                            <div class="col-4" style="text-align: left;">
                                <a target="_blank" rel="noopener noreferrer" href="https://github.com/NoahBolohan/hadrians-wall-utilities/issues/new">Report an issue</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="container-fluid" id="container_header">

            <div class="row justify-content-center align-items-center" style="height:12vh; margin-top: 3vh;" id="row_header">

                <div class="row justify-content-center align-items-center " style="height:5vh; margin-top: 1vh;" id="row_header_1">

                    <div class="col-auto m-0 px-0 text-center h1 header-content">Hadrian's Wall Utilities</div>
                </div>
        
                <div class="row justify-content-center align-items-center " style="height:5vh; margin-bottom: 1vh;" id="row_header_2">
        
                    <div class="col-auto m-0 px-0 text-center h2 header-content">by Noah Bolohan</div>
                </div>
            </div>
        </div>

        <div class="container-fluid" id="container_body">

                    <div class="row p-0 justify-content-center margin_auto" id="row_neutral_deck_tracker">

                    </div>

                    <div class="row p-0 justify-content-center margin_auto" style="margin-top:2vh;" id="row_score_sheet">

                    </div>

                                About
                            </button>

                        <div class="col-6 align-self-center">

                            <button class="w-100 btn nav-button btn-settings" type="button" id="button_settings">

                    </div>
